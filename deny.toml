# cargo-deny configuration for Cadenza.
#
# CLAUDE.md hard constraint: every dependency must be MIT, Apache-2.0,
# BSD, or MPL-2.0 — no GPL/LGPL/AGPL ever. This file enforces that.
#
# Run locally:   cargo deny check
# Run in CI:     cargo deny check licenses bans advisories sources

[graph]
all-features = true

[output]
feature-depth = 1

[licenses]
version = 2
confidence-threshold = 0.93

# Allowed SPDX identifiers. Everything else fails the build.
# All entries below are permissive / OSI-approved and non-copyleft, in
# line with the CLAUDE.md hard constraint "no GPL/LGPL/AGPL ever".
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "BSL-1.0",
    "ISC",
    "MPL-2.0",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]

# No per-crate exceptions: if a crate's license isn't in `allow`, it fails.
exceptions = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace path dependencies (`{ path = ... }`) carry no version, so
# cargo-deny treats them as wildcards. Permit that — they're internal.
allow-wildcard-paths = true
# Crates we deliberately refuse to depend on (license, security, or
# abandonment grounds). Empty for now — add as the dependency graph grows.
deny = []
skip = []
skip-tree = []

[advisories]
version = 2
yanked = "warn"
# All currently ignored advisories are `unmaintained` flags (not CVEs)
# on transitive deps pulled in by Tauri's Linux stack and url-parsing.
# They have no upgrade path and no security impact today; revisit when
# upstream Tauri migrates off them.
ignore = [
    # rust-unic family (via tauri-utils → urlpattern → unic-ucd-ident).
    { id = "RUSTSEC-2025-0075", reason = "unic-char-range unmaintained; transitive via tauri-utils/urlpattern" },
    { id = "RUSTSEC-2025-0080", reason = "unic-common unmaintained; transitive via tauri-utils/urlpattern" },
    { id = "RUSTSEC-2025-0081", reason = "unic-char-property unmaintained; transitive via tauri-utils/urlpattern" },
    { id = "RUSTSEC-2025-0098", reason = "unic-ucd-version unmaintained; transitive via tauri-utils/urlpattern" },
    { id = "RUSTSEC-2025-0100", reason = "unic-ucd-ident unmaintained; transitive via tauri-utils/urlpattern" },

    # gtk-rs GTK3 bindings (Linux-only, via tauri runtime).
    { id = "RUSTSEC-2024-0411", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0412", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0413", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0414", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0415", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0416", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0417", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0418", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0419", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },
    { id = "RUSTSEC-2024-0420", reason = "gtk-rs GTK3 binding unmaintained; transitive Linux via tauri" },

    # Misc transitive unmaintained crates.
    { id = "RUSTSEC-2024-0370", reason = "proc-macro-error unmaintained; transitive via portable-pty" },
    { id = "RUSTSEC-2017-0008", reason = "serial crate unmaintained; transitive via portable-pty" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
