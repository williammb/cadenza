name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

# A pushed `v*` tag builds and publishes Windows and macOS — the platforms
# Cadenza ships today (see docs/RELEASING.md). Linux is still gated behind
# manual `workflow_dispatch` until its AppImage is actually distributed.
# The publishing jobs run sequentially (Windows → macOS) so each tauri-action
# merges its platform entry into the shared `latest.json` instead of racing
# on it. Linux, when it ships, drops its `workflow_dispatch`-only guard and
# rejoins the chain.
jobs:
  build-windows:
    name: Build (Windows · NSIS)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      # The tag `vX.Y.Z` is the single source of truth for the release
      # version. We stamp it into the manifests here, on the runner's
      # throwaway checkout, before the build — nothing is committed back to
      # `main`, so the protected branch keeps its `0.0.0` placeholder and
      # never drifts. Skipped on workflow_dispatch (no tag): that path builds
      # a `0.0.0` smoke-test artifact without publishing. perl (not sed) so
      # the same step works on the BSD-sed macOS runner too.
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not a valid semver version (vX.Y.Z)"
            exit 1
          fi
          echo "Building $VERSION from tag $GITHUB_REF_NAME"
          perl -0pi -e 's/^version = .*$/version = "'"$VERSION"'"/m' Cargo.toml
          perl -pi -e 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: release-${{ runner.os }}-stable
          cache-on-failure: true

      - name: Build, sign and publish (Windows)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cadenza ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --target x86_64-pc-windows-msvc --bundles nsis

      # Smoke-test path: on workflow_dispatch (no tag), just build and
      # upload artifacts — never touch a public release.
      - name: Build (Windows, smoke-test)
        if: github.event_name == 'workflow_dispatch'
        run: cargo tauri build --target x86_64-pc-windows-msvc --bundles nsis
        shell: bash

      - name: Upload installer artifact (smoke-test)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: cadenza-windows-installer
          path: |
            target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error

  build-linux:
    name: Build (Linux · AppImage)
    runs-on: ubuntu-22.04
    needs: build-windows
    # Manual-only until Linux bundles ship; skipped on `v*` tag releases.
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libdbus-1-dev \
            patchelf \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: release-${{ runner.os }}-stable
          cache-on-failure: true

      - name: Build, sign and publish (Linux)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cadenza ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --bundles appimage

  build-macos:
    name: Build (macOS · DMG · universal)
    runs-on: macos-latest
    # Chain after Windows (not Linux, which is skipped on tags) so the two
    # shipping platforms publish sequentially into the shared latest.json.
    needs: build-windows
    # Runs on `v*` tag releases and on manual dispatch.
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v6

      # Stamp the release version from the tag before building (same as the
      # Windows job). perl keeps it portable across the BSD-sed macOS runner.
      # Skipped on workflow_dispatch (smoke-test builds the `0.0.0` placeholder).
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Tag '$GITHUB_REF_NAME' is not a valid semver version (vX.Y.Z)"
            exit 1
          fi
          echo "Building $VERSION from tag $GITHUB_REF_NAME"
          perl -0pi -e 's/^version = .*$/version = "'"$VERSION"'"/m' Cargo.toml
          perl -pi -e 's/"version": "[^"]*"/"version": "'"$VERSION"'"/' src-tauri/tauri.conf.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal DMG requires both architectures; macos-latest defaults
          # to apple-silicon-only otherwise, leaving Intel Macs without a
          # working installer.
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          shared-key: release-${{ runner.os }}-stable
          cache-on-failure: true

      - name: Build, sign and publish (macOS)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Cadenza ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          args: --target universal-apple-darwin --bundles dmg
