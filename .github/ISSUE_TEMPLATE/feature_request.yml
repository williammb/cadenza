name: Feature request
description: Suggest an improvement or new capability.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or workflow gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would a good solution look like?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Include simpler options or tradeoffs.
  - type: checkboxes
    id: constraints
    attributes:
      label: Project constraints
      options:
        - label: I checked that this fits the current Tauri, vanilla UI, local IPC, and Fluent i18n architecture.
